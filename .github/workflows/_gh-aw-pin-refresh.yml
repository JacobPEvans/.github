# Reusable: gh-aw action pin refresh
# Refreshes SHA pins in gh-aw generated files via `gh aw compile --force-refresh-action-pins`.
#
# Replaces Renovate for generated gh-aw files, which Renovate cannot update correctly
# (Renovate only patches `uses:` lines but leaves manifest JSON and actions-lock.json
# inconsistent).
#
# Usage from a caller workflow:
#
#   jobs:
#     refresh:
#       permissions:
#         contents: write
#         pull-requests: write
#       uses: JacobPEvans/.github/.github/workflows/_gh-aw-pin-refresh.yml@main
#       with:
#         operation: compile   # or 'upgrade' for full gh-aw infrastructure update
#       secrets:
#         GH_ACTION_JACOBPEVANS_APP_ID: ${{ secrets.GH_ACTION_JACOBPEVANS_APP_ID }}
#         GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
#
# Secrets required:
#   GH_ACTION_JACOBPEVANS_APP_ID  - GitHub App ID
#   GH_APP_PRIVATE_KEY            - GitHub App private key
#
# The GitHub App token is required so the resulting PR triggers `pull_request`
# workflows (e.g. CI gate, CodeQL). PRs created with GITHUB_TOKEN do NOT trigger them.
# `sign-commits: true` in create-pull-request satisfies `required_signatures` branch protection
# by creating commits via the GitHub API (signed) rather than local `git commit` (unsigned).
name: _gh-aw-pin-refresh

on:
  workflow_call:
    inputs:
      operation:
        description: 'compile = refresh SHA pins only; upgrade = full gh-aw infrastructure update'
        type: string
        default: 'compile'
    secrets:
      GH_ACTION_JACOBPEVANS_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  refresh-pins:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_ACTION_JACOBPEVANS_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install gh-aw CLI
        uses: github/gh-aw-actions/setup-cli@v0.71.3
        with:
          version: v0.68.3

      - name: Run gh aw upgrade
        if: inputs.operation == 'upgrade'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh aw upgrade

      - name: Refresh action pins (with 24h supply-chain soak)
        if: inputs.operation != 'upgrade'
        uses: JacobPEvans/.github/.github/actions/gh-aw-soak-refresh@main
        with:
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          branch: gh-aw/refresh-action-pins
          delete-branch: true
          title: "fix(deps): refresh gh-aw action SHA pins"
          body: |
            Automated refresh of action SHA pins via `gh aw compile --force-refresh-action-pins`.

            Updates `actions-lock.json`, all `*.lock.yml` workflows, and
            `agentics-maintenance.yml` with consistent, freshly-resolved SHAs.
            SHAs younger than 24h are held back to their predecessor (supply-chain soak).
          labels: dependencies
          commit-message: "fix(deps): refresh gh-aw action SHA pins"

      # Disable+re-enable handles RC3 (stale auto-merge queue: PR is CLEAN
      # with auto-merge enabled but GitHub never executes the merge). The
      # retry loop handles RC2 (transient GraphQL errors from `gh pr merge --auto`).
      - name: Enable auto-merge (with re-poke + retry)
        if: "!cancelled() && steps.cpr.outputs.pull-request-number != ''"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR_NUMBER" --disable-auto 2>/dev/null || true
          for _ in 1 2 3; do gh pr merge "$PR_NUMBER" --auto --squash && exit 0; sleep 15; done
          exit 1
