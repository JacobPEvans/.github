# Reusable: CI Gate (Merge Gatekeeper)
#
# Centralizes the conditional-required-check pattern that previously lived as
# duplicated `ci-gate.yml` files in every consumer repo.
#
# What this workflow does:
#
#   changes  -> dorny/paths-filter on caller-supplied filters
#   <check jobs> -> per-check reusable workflows, gated on (input toggle && filter)
#   watchdog -> sleeps queue_timeout_minutes, cancels any sibling job still
#               in `queued` state so the gate is never blocked indefinitely
#   gate     -> name MUST stay "Merge Gate" (matches branch protection rulesets);
#               aggregates results via re-actors/alls-green
#
# Why the watchdog exists:
#
# GitHub Actions only schedules a `needs:` dependent once every upstream job
# reaches a *terminal* state (success/failure/cancelled/skipped). A job stuck
# in `queued` (e.g. self-hosted runner never picks it up) is NOT terminal, so
# `gate` never runs and the required `Merge Gate` status never reports. The
# watchdog forces a terminal state by cancelling stuck queued jobs.
#
# Filter name convention (caller defines these in `filters:` input):
#
#   nix            -> gates `nix_validate`
#   markdown       -> gates `markdown_lint` and `file_size`
#   python         -> gates `python_security`
#
# Callers may include additional filters; this workflow ignores them. To add
# a new conditional check, add: input toggle, conditional job, and entry in
# the gate's `needs:` and `allowed-skips`.

name: _ci-gate

on:
  workflow_call:
    inputs:
      filters:
        description: >-
          YAML body for dorny/paths-filter. Use the convention names listed
          in this file's header to enable the matching conditional check.
        type: string
        required: true

      nix_validate:
        description: Enable `Nix Validate` (gated on `nix` filter)
        type: boolean
        default: false
      markdown_lint:
        description: Enable `Markdown Lint` (gated on `markdown` filter)
        type: boolean
        default: false
      file_size:
        description: Enable `File Size` (gated on `nix` OR `markdown` filter)
        type: boolean
        default: false
      python_security:
        description: Enable `Python Security` (gated on `python` filter)
        type: boolean
        default: false
      python_security_dirs:
        description: Space-separated dirs passed to _python-security.yml
        type: string
        default: ''

      queue_timeout_minutes:
        description: >-
          Minutes the watchdog waits before cancelling sibling jobs still in
          `queued` state. Default 10. Cap your slowest gate-path job at well
          below this value or it will be killed before it starts.
        type: number
        default: 10

permissions:
  contents: read
  pull-requests: read

jobs:
  # ============================================================================
  # CHANGE DETECTION
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
      markdown: ${{ steps.filter.outputs.markdown }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: ${{ inputs.filters }}

  # ============================================================================
  # CONDITIONAL CHECKS
  # Each is gated on `inputs.<toggle>` AND `needs.changes.outputs.<filter>`.
  # Disabled or untouched paths skip; `re-actors/alls-green` accepts skips.
  # ============================================================================
  nix-validate:
    name: Nix Validate
    needs: changes
    if: ${{ inputs.nix_validate && needs.changes.outputs.nix == 'true' }}
    uses: JacobPEvans/.github/.github/workflows/_nix-validate.yml@main

  markdown-lint:
    name: Markdown Lint
    needs: changes
    if: ${{ inputs.markdown_lint && needs.changes.outputs.markdown == 'true' }}
    uses: JacobPEvans/.github/.github/workflows/_markdown-lint.yml@main

  file-size:
    name: File Size
    needs: changes
    if: ${{ inputs.file_size && (needs.changes.outputs.nix == 'true' || needs.changes.outputs.markdown == 'true') }}
    uses: JacobPEvans/.github/.github/workflows/_file-size.yml@main

  python-security:
    name: Python Security
    needs: changes
    if: ${{ inputs.python_security && needs.changes.outputs.python == 'true' }}
    uses: JacobPEvans/.github/.github/workflows/_python-security.yml@main
    with:
      python-dirs: ${{ inputs.python_security_dirs }}
    secrets: inherit

  # ============================================================================
  # WATCHDOG
  # Forces a terminal state for queued sibling jobs after queue_timeout_minutes.
  # Itself reports success regardless — its job is to unstick the gate.
  # ============================================================================
  watchdog:
    name: Queue Watchdog
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      actions: write  # required to cancel sibling jobs
    # Hardcoded ceiling — GHA expressions don't support arithmetic so this
    # can't be derived from `queue_timeout_minutes`. 30 min handles up to a
    # ~25-minute queue_timeout with comfortable margin.
    timeout-minutes: 30
    steps:
      - name: Sparse-checkout watchdog script from this repo
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/.github
          ref: main
          path: .gh-shared
          sparse-checkout: scripts/ci-gate-watchdog.sh
          sparse-checkout-cone-mode: false
      - name: Sleep, then cancel any sibling job still queued
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUEUE_TIMEOUT_MINUTES: ${{ inputs.queue_timeout_minutes }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: bash .gh-shared/scripts/ci-gate-watchdog.sh

  # ============================================================================
  # MERGE GATE — the only check that branch protection requires.
  # `name:` MUST stay "Merge Gate" (matches existing required_status_checks).
  # ============================================================================
  gate:
    name: Merge Gate
    needs: [changes, watchdog, nix-validate, markdown-lint, file-size, python-security]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        uses: re-actors/alls-green@release/v1
        with:
          # `watchdog` is always-success-on-completion; treating it as
          # allowed-skip lets `alls-green` ignore its result either way.
          allowed-skips: nix-validate, markdown-lint, file-size, python-security, watchdog
          jobs: ${{ toJSON(needs) }}
