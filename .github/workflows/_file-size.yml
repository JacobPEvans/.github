# Reusable: File Size Check
# Delegates to repo's own script, shared YAML-config checker, or inline fallback.
name: _file-size

on:
  workflow_call:
    inputs:
      max-file-size-kb:
        description: "Maximum file size in KB (legacy fallback)"
        type: number
        default: 500
      exclude-patterns:
        description: 'JSON array of find exclusions (path if contains /, name otherwise)'
        type: string
        default: '["./.git/*", "./node_modules/*", "./result*", "*.lock", "package-lock.json", "pnpm-lock.yaml"]'

concurrency:
  group: file-size-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check file sizes
        env:
          MAX_KB: ${{ inputs.max-file-size-kb }}
          EXCLUDES: ${{ inputs.exclude-patterns }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          # Priority 1: Delegate to repo's own script
          [ -x "./scripts/workflows/check-file-sizes.sh" ] && exec ./scripts/workflows/check-file-sizes.sh

          # Priority 2: Use shared YAML-config checker if .file-size.yml exists
          if [ -f ".file-size.yml" ]; then
            if curl -sSfL --retry 3 --retry-connrefused \
              "https://raw.githubusercontent.com/${REPO_OWNER}/.github/main/scripts/workflows/check-file-sizes.sh" \
              -o /tmp/check-file-sizes.sh; then
              chmod +x /tmp/check-file-sizes.sh
              exec /tmp/check-file-sizes.sh
            fi
            echo "::warning::Failed to download shared checker; falling back to inline"
          fi

          # Priority 3: Inline fallback (legacy)
          args=()
          for p in $(echo "$EXCLUDES" | jq -r '.[]'); do
            [[ "$p" == */* ]] && args+=(-not -path "$p") || args+=(-not -name "$p")
          done

          rc=0
          while IFS= read -r -d '' f; do
            kb=$(( $(stat -c%s "$f") / 1024 ))
            if [ "$kb" -gt "$MAX_KB" ]; then
              echo "::error file=$f::${kb}KB exceeds ${MAX_KB}KB limit"
              rc=1
            fi
          done < <(find . -type f "${args[@]}" -print0)
          exit $rc
