# Multi-ecosystem lockfile vulnerability scanning via Google OSV
#
# Reusable workflow — called from repo-level ci-gate.yml files.
# Scans lockfiles (uv.lock, package-lock.json, .terraform.lock.hcl, etc.)
# for known vulnerabilities across all supported ecosystems.
name: _osv-scan

on:
  workflow_call:
    inputs:
      config:
        description: 'Path to osv-scanner.toml config file (applies to all scanned files)'
        required: false
        default: ''
        type: string

concurrency:
  group: osv-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for config file
        id: config
        run: |
          if [ -f osv-scanner.toml ]; then
            echo "args=--config=osv-scanner.toml" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            ${{ steps.config.outputs.args }}
            --recursive
            ${{ inputs.config != '' && format('--config={0}', inputs.config) || '' }}
            .
