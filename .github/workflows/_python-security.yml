# Python dependency vulnerability scanning via pip-audit
#
# Reusable workflow — called from repo-level ci-gate.yml files.
# Scans Python projects for known CVEs in resolved dependencies.
name: _python-security

on:
  workflow_call:
    inputs:
      python-dirs:
        description: 'Space-separated list of directories containing pyproject.toml'
        required: true
        type: string

concurrency:
  group: python-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Audit Python dependencies
        env:
          PYTHON_DIRS: ${{ inputs.python-dirs }}
        run: |
          for dir in $PYTHON_DIRS; do
            echo "::group::Scanning $dir"
            cd "$GITHUB_WORKSPACE/$dir"
            # --no-emit-project avoids exporting the local project as an editable requirement when
            # hashes are present, which would cause pip / pip-audit to fail with
            # "editable requirement cannot be installed when requiring hashes".
            uv export --format requirements-txt --output-file requirements.txt --locked --no-emit-project
            # GHSA-5239-wwwm-4pmq (CVE-2026-4539): ReDoS in pygments AdlLexer — transitive dep via
            # rich and pytest; only triggered when parsing ADL files (not done here); no fix yet.
            # Remove this flag once pygments releases a patched version (tracked in nix-ai#355).
            uvx pip-audit --progress-spinner=off --desc \
              --ignore-vuln GHSA-5239-wwwm-4pmq \
              -r requirements.txt
            echo "::endgroup::"
          done
