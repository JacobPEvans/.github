# Reusable: Release Please
# Automates versioning and changelog via conventional commits.
name: _release-please

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject central release-please config
        run: |
          curl -sfL \
            "https://raw.githubusercontent.com/JacobPEvans/.github/main/release-please-config.json" \
            -o release-please-config.json

      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
