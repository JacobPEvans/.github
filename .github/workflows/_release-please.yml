# Reusable: Release Please
# Automates versioning and changelog via conventional commits.
#
# All release configuration is inlined as action inputs.
# Calling repos should pass secrets and permissions explicitly:
#
#   jobs:
#     release-please:
#       permissions:
#         contents: write
#         pull-requests: write
#       uses: JacobPEvans/.github/.github/workflows/_release-please.yml@main
#       secrets:
#         GH_ACTION_JACOBPEVANS_APP_ID: ${{ secrets.GH_ACTION_JACOBPEVANS_APP_ID }}
#         GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
#
# Org/repo prerequisites:
#   "Allow GitHub Actions to create and approve pull requests" must be enabled
#   Calling repos must grant `contents: write` and `pull-requests: write` in the caller job permissions
#
# Required files in each calling repo:
#   VERSION                         - plain-text current version (e.g. "1.2.3")
#   .release-please-manifest.json  - release-please manifest (e.g. {"." : "1.2.3"})
#
# Secrets required:
#   GH_ACTION_JACOBPEVANS_APP_ID  - GitHub App ID (repo-level secret)
#   GH_APP_PRIVATE_KEY            - GitHub App private key (repo-level secret)
#
# The GitHub App token is required so release-please PRs trigger `pull_request`
# workflows (e.g. CI Gate). PRs created with GITHUB_TOKEN do NOT trigger them.
name: _release-please

on:
  workflow_call:
    secrets:
      GH_ACTION_JACOBPEVANS_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_ACTION_JACOBPEVANS_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: simple
          version-file: VERSION
          include-v-in-tag: true
          # Version bumps follow standard semver via conventional commits:
          #   fix:  → patch    feat:  → minor
          # Automated major bumps are blocked (see guard step below).
          # Major bumps require manually editing .release-please-manifest.json.
          # Note: `breaking:` commit type is for changelog display only.
          changelog-types: |
            [
              {"type": "feat", "section": "Features"},
              {"type": "fix", "section": "Bug Fixes"},
              {"type": "perf", "section": "Performance"},
              {"type": "breaking", "section": "Breaking Changes"},
              {"type": "chore", "section": "Miscellaneous", "hidden": true},
              {"type": "ci", "section": "CI", "hidden": true},
              {"type": "docs", "section": "Documentation", "hidden": true},
              {"type": "refactor", "section": "Refactoring", "hidden": true},
              {"type": "test", "section": "Tests", "hidden": true}
            ]
          manifest-file: .release-please-manifest.json

      - name: Find release PR number
        id: find-pr
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: |
          PR_NUMBER=$(gh pr list --head "release-please--branches--${BASE_BRANCH}" --json number --jq '.[0].number // empty')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Guard against automated major bumps
        if: steps.find-pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.number }}
        run: |
          # Get proposed version from the release PR title
          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title')
          PROPOSED_VERSION=$(echo "$PR_TITLE" | grep -oP '\d+\.\d+\.\d+' | head -1)

          if [ -z "$PROPOSED_VERSION" ]; then
            echo "::warning::Could not extract version from release PR title: $PR_TITLE"
            exit 0
          fi

          PROPOSED_MAJOR=$(echo "$PROPOSED_VERSION" | cut -d. -f1)

          # Get current version from manifest
          CURRENT_VERSION=$(jq -r '."."' .release-please-manifest.json)
          CURRENT_MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)

          if [ "$PROPOSED_MAJOR" != "$CURRENT_MAJOR" ]; then
            echo "::error::Automated major bump blocked ($CURRENT_VERSION -> $PROPOSED_VERSION). Major bumps require manually editing .release-please-manifest.json."
            gh pr close "$PR_NUMBER" --comment "Automated major version bump blocked ($CURRENT_VERSION -> $PROPOSED_VERSION). Major bumps are human-initiated only. To perform a major bump, manually edit .release-please-manifest.json and push to main."
            exit 1
          fi

      - name: Enable auto-merge for release PR
        if: steps.find-pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash

      - name: Approve release PR
        if: steps.find-pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.number }}
        run: gh pr review "$PR_NUMBER" --approve
