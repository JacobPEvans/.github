# Reusable: Release Please
# Automates versioning and changelog via conventional commits.
#
# All release configuration is inlined as action inputs.
# Calling repos should pass secrets and permissions explicitly:
#
#   jobs:
#     release-please:
#       permissions:
#         contents: write
#         pull-requests: write
#       uses: JacobPEvans/.github/.github/workflows/_release-please.yml@main
#       secrets:
#         GH_ACTION_JACOBPEVANS_APP_ID: ${{ secrets.GH_ACTION_JACOBPEVANS_APP_ID }}
#         GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
#
# Org/repo prerequisites:
#   "Allow GitHub Actions to create and approve pull requests" must be enabled
#   Calling repos must grant `contents: write` and `pull-requests: write` in the caller job permissions
#
# Required files in each calling repo:
#   VERSION                         - plain-text current version (e.g. "1.2.3")
#   .release-please-manifest.json  - release-please manifest (e.g. {"." : "1.2.3"})
#
# Secrets required:
#   GH_ACTION_JACOBPEVANS_APP_ID  - GitHub App ID (repo-level secret)
#   GH_APP_PRIVATE_KEY            - GitHub App private key (repo-level secret)
#
# The GitHub App token is required so release-please PRs trigger `pull_request`
# workflows (e.g. CI Gate). PRs created with GITHUB_TOKEN do NOT trigger them.
name: _release-please

on:
  workflow_call:
    secrets:
      GH_ACTION_JACOBPEVANS_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_ACTION_JACOBPEVANS_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Debug - test app token permissions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "Testing app token permissions..."
          gh api /repos/${{ github.repository }} --jq '.permissions' || true
          echo "Testing release creation capability..."
          gh api /repos/${{ github.repository }}/releases --method POST \
            -f tag_name="test-permissions-probe" \
            -f name="test" \
            -f body="probe" \
            -F draft=true 2>&1 | head -20 || true
          echo "Cleaning up test release..."
          RELEASE_ID=$(gh api /repos/${{ github.repository }}/releases/tags/test-permissions-probe --jq '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            gh api /repos/${{ github.repository }}/releases/$RELEASE_ID --method DELETE || true
            git push origin :refs/tags/test-permissions-probe || true
          fi

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: simple
          version-file: VERSION
          include-v-in-tag: true
          versioning-strategy: always-bump-minor
          # Note: `breaking:` commit type is for changelog display only — it shows commits in the
          # "Breaking Changes" section. It does NOT trigger a semver major bump. Major bumps require
          # a `BREAKING CHANGE:` footer or `!` suffix (e.g. `feat!:`). With always-bump-minor the
          # minimum bump is minor regardless.
          changelog-types: |
            [
              {"type": "feat", "section": "Features"},
              {"type": "fix", "section": "Bug Fixes"},
              {"type": "perf", "section": "Performance"},
              {"type": "breaking", "section": "Breaking Changes"},
              {"type": "chore", "section": "Miscellaneous", "hidden": true},
              {"type": "ci", "section": "CI", "hidden": true},
              {"type": "docs", "section": "Documentation", "hidden": true},
              {"type": "refactor", "section": "Refactoring", "hidden": true},
              {"type": "test", "section": "Tests", "hidden": true}
            ]
          manifest-file: .release-please-manifest.json

      - name: Find release PR number
        id: find-pr
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: |
          PR_NUMBER=$(gh pr list --head "release-please--branches--${BASE_BRANCH}" --json number --jq '.[0].number // empty')
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Enable auto-merge for release PR
        if: steps.find-pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash

      - name: Approve release PR
        if: steps.find-pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.number }}
        run: gh pr review "$PR_NUMBER" --approve
