# Reusable: Release Please
# Automates versioning and changelog via conventional commits.
#
# Release configuration lives in each repo's release-please-config.json.
# Calling repos should pass secrets and permissions explicitly:
#
#   jobs:
#     release-please:
#       permissions:
#         contents: write
#         pull-requests: write
#       uses: JacobPEvans/.github/.github/workflows/_release-please.yml@main
#       secrets:
#         GH_ACTION_JACOBPEVANS_APP_ID: ${{ secrets.GH_ACTION_JACOBPEVANS_APP_ID }}
#         GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
#
# Org/repo prerequisites:
#   "Allow GitHub Actions to create and approve pull requests" must be enabled
#   Calling repos must grant `contents: write` and `pull-requests: write` in the caller job permissions
#
# Repo files:
#   .release-please-manifest.json  - REQUIRED: version manifest (e.g. {"." : "1.2.3"})
#   release-please-config.json     - REQUIRED: release config (repo-specific settings only;
#                                    versioning policy is enforced by this workflow centrally)
#
# Secrets required:
#   GH_ACTION_JACOBPEVANS_APP_ID  - GitHub App ID (repo-level secret)
#   GH_APP_PRIVATE_KEY            - GitHub App private key (repo-level secret)
#
# The GitHub App token is required so release-please PRs trigger `pull_request`
# workflows (e.g. CI Gate). PRs created with GITHUB_TOKEN do NOT trigger them.
name: _release-please

on:
  workflow_call:
    secrets:
      GH_ACTION_JACOBPEVANS_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      # Org policy: automated major version bumps are forbidden.
      # This overrides any repo-level versioning config to ensure release-please
      # never computes a major bump, regardless of BREAKING CHANGE footers.
      # Major bumps are human-initiated only via .release-please-manifest.json.
      - name: Enforce org-wide versioning policy (block automated major bumps)
        run: |
          jq '.packages[].versioning = "always-bump-minor"' release-please-config.json > /tmp/rp.json
          mv /tmp/rp.json release-please-config.json

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_ACTION_JACOBPEVANS_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

      - name: Find release PR number
        id: find-pr
        if: '!cancelled()'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: |
          PR_NUMBER=$(gh pr list --head "release-please--branches--${BASE_BRANCH}" --json number --jq '.[0].number // empty')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for release PR
        if: "!cancelled() && steps.find-pr.outputs.number != ''"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash

      - name: Approve release PR
        if: "!cancelled() && steps.find-pr.outputs.number != ''"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.number }}
        run: gh pr review "$PR_NUMBER" --approve
