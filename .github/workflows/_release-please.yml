# Reusable: Release Please
# Automates versioning and changelog via conventional commits.
name: _release-please

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Inject central release-please config
        run: |
          curl -sfL \
            "https://raw.githubusercontent.com/JacobPEvans/.github/main/release-please-config.json" \
            -o release-please-config.json
          python3 -c "import json,sys; json.load(open('release-please-config.json'))" || { echo 'Config download failed or invalid JSON' >&2; exit 1; }

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Enable auto-merge for release PR
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          PR_NUMBER=$(python3 - << 'PY'
          import json, os, sys
          pr_json = os.environ.get("PR_JSON")
          if not pr_json:
              sys.stderr.write("Error: PR_JSON is empty or not set.\n")
              sys.exit(1)
          try:
              data = json.loads(pr_json)
          except json.JSONDecodeError as e:
              sys.stderr.write(f"Error: Failed to parse PR_JSON: {e}\n")
              sys.exit(1)
          number = data.get("number")
          if number is None:
              sys.stderr.write("Error: 'number' field missing from PR_JSON.\n")
              sys.exit(1)
          print(number)
          PY
          )
          gh pr merge "$PR_NUMBER" --auto --squash
